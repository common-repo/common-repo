name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-please

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: authenticate
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.COMMON_REPO_BOT_CLIENT_ID }}
          private-key: ${{ secrets.COMMON_REPO_BOT_PRIVATE_KEY }}

      - id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ steps.authenticate.outputs.token }}

  build-binaries:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux)
        if: matrix.os == 'ubuntu-latest' && matrix.target != 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          case "${{ matrix.target }}" in
            x86_64-unknown-linux-musl)
              sudo apt-get install -y musl-tools
              ;;
            aarch64-unknown-linux-gnu)
              sudo apt-get install -y gcc-aarch64-linux-gnu
              ;;
          esac

      - name: Configure linker (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p .cargo
          echo '[target.aarch64-unknown-linux-gnu]' >> .cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          strip common-repo || true
          tar czvf ../../../common-repo-${{ needs.release-please.outputs.tag_name }}-${{ matrix.target }}.tar.gz common-repo

      - name: Prepare binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path common-repo.exe -DestinationPath ../../../common-repo-${{ needs.release-please.outputs.tag_name }}-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: common-repo-${{ matrix.target }}
          path: common-repo-${{ needs.release-please.outputs.tag_name }}-${{ matrix.target }}.${{ matrix.archive }}

  upload-release-assets:
    needs: [release-please, build-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          for file in artifacts/*; do
            gh release upload "${{ needs.release-please.outputs.tag_name }}" "$file" --clobber
          done

  update-homebrew-tap:
    needs: [release-please, upload-release-assets]
    runs-on: ubuntu-latest
    steps:
      - id: authenticate
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.COMMON_REPO_BOT_CLIENT_ID }}
          private-key: ${{ secrets.COMMON_REPO_BOT_PRIVATE_KEY }}
          owner: common-repo
          repositories: homebrew-tap

      - name: Download macOS and Linux artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: common-repo-*
          merge-multiple: true

      - name: Compute SHA256 checksums
        id: checksums
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          get_sha() { shasum -a 256 "artifacts/common-repo-${TAG}-$1.tar.gz" | awk '{print $1}'; }
          echo "mac_arm_sha=$(get_sha aarch64-apple-darwin)"        >> "$GITHUB_OUTPUT"
          echo "linux_arm_sha=$(get_sha aarch64-unknown-linux-gnu)" >> "$GITHUB_OUTPUT"
          echo "linux_intel_sha=$(get_sha x86_64-unknown-linux-gnu)" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: common-repo/homebrew-tap
          token: ${{ steps.authenticate.outputs.token }}
          path: homebrew-tap

      - name: Update formula
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
          MAC_ARM_SHA: ${{ steps.checksums.outputs.mac_arm_sha }}
          LINUX_ARM_SHA: ${{ steps.checksums.outputs.linux_arm_sha }}
          LINUX_INTEL_SHA: ${{ steps.checksums.outputs.linux_intel_sha }}
        run: |
          python3 - <<'EOF'
          import os, re

          formula = open("homebrew-tap/Formula/common-repo.rb").read()
          version = os.environ["TAG"].lstrip("v")

          formula = re.sub(r'version ".*"', f'version "{version}"', formula)

          shas = {
            "aarch64-apple-darwin":        os.environ["MAC_ARM_SHA"],
            "aarch64-unknown-linux-gnu":   os.environ["LINUX_ARM_SHA"],
            "x86_64-unknown-linux-gnu":    os.environ["LINUX_INTEL_SHA"],
          }
          for target, sha in shas.items():
            formula = re.sub(
              rf'(url ".*{re.escape(target)}.*"\n\s+sha256 )"[^"]*"',
              rf'\1"{sha}"',
              formula
            )

          open("homebrew-tap/Formula/common-repo.rb", "w").write(formula)
          EOF

      - name: Commit and push
        run: |
          cd homebrew-tap
          git config user.name "common-repo-bot"
          git config user.email "bot@users.noreply.github.com"
          git add Formula/common-repo.rb
          git commit -m "chore: update common-repo to ${{ needs.release-please.outputs.tag_name }}"
          git push
