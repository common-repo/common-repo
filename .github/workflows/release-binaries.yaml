name: Release binaries

# Slot 3 (post-release publish): the semantic-release template (release.yaml)
# creates the GitHub Release first; this workflow fires on that release event,
# builds binaries for every supported target, and uploads them as release
# assets. install.sh and `cargo binstall common-repo` both expect archives at
# https://github.com/common-repo/common-repo/releases/download/${tag}/common-repo-${tag}-${target}.${ext}
# — keep the naming in sync with install.sh::archive_name.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and upload assets for (e.g. v0.37.0)"
        required: true

permissions:
  contents: write

concurrency:
  group: release-binaries-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    runs-on: ${{ matrix.os }}
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux)
        if: matrix.os == 'ubuntu-latest' && matrix.target != 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          case "${{ matrix.target }}" in
            x86_64-unknown-linux-musl)
              sudo apt-get install -y musl-tools
              ;;
            aarch64-unknown-linux-gnu)
              sudo apt-get install -y gcc-aarch64-linux-gnu
              ;;
          esac

      - name: Configure linker (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p .cargo
          echo '[target.aarch64-unknown-linux-gnu]' >> .cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          strip common-repo || true
          tar czvf ../../../common-repo-${TAG}-${{ matrix.target }}.tar.gz common-repo

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path common-repo.exe -DestinationPath ../../../common-repo-${env:TAG}-${{ matrix.target }}.zip

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          gh release upload "${TAG}" \
            "common-repo-${TAG}-${{ matrix.target }}.${{ matrix.archive }}" \
            --clobber

  update-homebrew-tap:
    name: Update homebrew tap
    needs: build
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - id: authenticate
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.COMMON_REPO_BOT_CLIENT_ID }}
          private-key: ${{ secrets.COMMON_REPO_BOT_PRIVATE_KEY }}
          owner: common-repo
          repositories: homebrew-tap

      # The build jobs upload archives directly to the GitHub Release, so we
      # pull them back down to compute SHA256s rather than passing artifacts
      # between jobs.
      - name: Download release archives
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          for target in aarch64-apple-darwin aarch64-unknown-linux-gnu x86_64-unknown-linux-gnu; do
            gh release download "${TAG}" \
              --pattern "common-repo-${TAG}-${target}.tar.gz" \
              --dir artifacts
          done

      - name: Compute SHA256 checksums
        id: checksums
        run: |
          set -euo pipefail
          get_sha() { shasum -a 256 "artifacts/common-repo-${TAG}-$1.tar.gz" | awk '{print $1}'; }
          echo "mac_arm_sha=$(get_sha aarch64-apple-darwin)"         >> "$GITHUB_OUTPUT"
          echo "linux_arm_sha=$(get_sha aarch64-unknown-linux-gnu)"  >> "$GITHUB_OUTPUT"
          echo "linux_intel_sha=$(get_sha x86_64-unknown-linux-gnu)" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: common-repo/homebrew-tap
          token: ${{ steps.authenticate.outputs.token }}
          path: homebrew-tap

      - name: Update formula
        env:
          MAC_ARM_SHA: ${{ steps.checksums.outputs.mac_arm_sha }}
          LINUX_ARM_SHA: ${{ steps.checksums.outputs.linux_arm_sha }}
          LINUX_INTEL_SHA: ${{ steps.checksums.outputs.linux_intel_sha }}
        run: |
          python3 - <<'EOF'
          import os, re

          formula = open("homebrew-tap/Formula/common-repo.rb").read()
          version = os.environ["TAG"].lstrip("v")

          formula = re.sub(r'version ".*"', f'version "{version}"', formula)

          shas = {
            "aarch64-apple-darwin":        os.environ["MAC_ARM_SHA"],
            "aarch64-unknown-linux-gnu":   os.environ["LINUX_ARM_SHA"],
            "x86_64-unknown-linux-gnu":    os.environ["LINUX_INTEL_SHA"],
          }
          for target, sha in shas.items():
            formula = re.sub(
              rf'(url ".*{re.escape(target)}.*"\n\s+sha256 )"[^"]*"',
              rf'\1"{sha}"',
              formula
            )

          open("homebrew-tap/Formula/common-repo.rb", "w").write(formula)
          EOF

      - name: Commit and push
        run: |
          cd homebrew-tap
          git config user.name "common-repo-bot"
          git config user.email "bot@users.noreply.github.com"
          git add Formula/common-repo.rb
          git commit -m "chore: update common-repo to ${TAG}"
          git push
